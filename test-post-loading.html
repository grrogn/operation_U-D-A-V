<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Post Loading</title>
  <script src="site-routes.js"></script>
  <script src="posts-data.js"></script>
  <script src="post-template.js"></script>
  <script>
    // Debug script to test post loading
    window.addEventListener('DOMContentLoaded', function() {
      console.log('=== POST LOADING DEBUG ===');
      console.log('Current pathname:', window.location.pathname);
      
      var routeTools = window.SITE_ROUTES || {};
      console.log('SITE_ROUTES available:', !!routeTools);
      console.log('getLegacyPostIdFromPath available:', !!routeTools.getLegacyPostIdFromPath);
      
      if (routeTools.getLegacyPostIdFromPath) {
        var testPaths = [
          '/blogs/sketch-a-streamlit-analytics-page-with-filters-before-the-data-arrives/',
          '/blogs/sketch-a-streamlit-analytics-page-with-filters-before-the-data-arrives/index.html',
          'blogs/sketch-a-streamlit-analytics-page-with-filters-before-the-data-arrives/',
          'post7.html'
        ];
        
        testPaths.forEach(function(path) {
          var result = routeTools.getLegacyPostIdFromPath(path);
          console.log('Path:', path, '-> Result:', result);
        });
      }
      
      console.log('POSTS_DATA available:', !!window.POSTS_DATA);
      console.log('POST_TEMPLATE available:', !!window.POST_TEMPLATE);
      
      if (window.POSTS_DATA) {
        console.log('post7.html in POSTS_DATA:', !!window.POSTS_DATA['post7.html']);
        console.log('Available posts:', Object.keys(window.POSTS_DATA));
      }
      
      document.body.innerHTML = '<pre id="output"></pre>';
      document.getElementById('output').textContent = 'Check browser console for debug output';
    });
  </script>
</head>
<body>
  <p>Loading debug information...</p>
</body>
</html>
